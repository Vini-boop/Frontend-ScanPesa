[build]
  command   = "npm run build"
  publish   = "dist"

# SPA routing — all paths serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api/* to the backend on Render
# Replace the URL below with your actual Render backend URL after deploying it
[[redirects]]
  from   = "/api/*"
  to     = "https://your-backend.onrender.com/:splat"
  status = 200
  force  = true

[build.environment]
  NODE_VERSION = "20"
