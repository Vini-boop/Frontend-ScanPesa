[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# API proxy - MUST come before the SPA catch-all
# Netlify forwards /api/* to your Render backend.
[[redirects]]
  from   = "/api/*"
  to     = "https://backend-scanpesa.onrender.com/:splat"
  status = 200
  force  = true

# SPA routing - all other paths serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
